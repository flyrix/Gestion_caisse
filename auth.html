<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/style.css" />
    <meta name="theme-color" content="#3498db" />
    <title>Connexion - Gestion de Caisse</title>
</head>
<body>
    <h1>Connexion</h1>

    <div class="auth-card">
        <p class="auth-description">Connectez-vous pour accéder à votre carnet de caisse et synchroniser vos opérations dans Supabase.</p>

        <label for="identifier">Email ou nom d'utilisateur</label>
        <input type="text" id="identifier" placeholder="votre@exemple.com ou monutilisateur" />

        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="Mot de passe" />

        <label for="signup-username">Nom d'utilisateur (pour création de compte)</label>
        <input type="text" id="signup-username" placeholder="Choisissez un nom d'utilisateur" />

        <div class="auth-actions">
            <button id="btn-connexion" type="button">Se connecter</button>
            <button id="btn-inscription" type="button">Créer un compte</button>
        </div>

        <button id="btn-reset" type="button" class="btn-secondaire">Mot de passe oublié</button>

        <div id="auth-message" class="auth-message"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
    <script src="scripts/supabase-config.js"></script>
    <script src="scripts/supabase.js"></script>
    <script src="scripts/auth.js"></script>
</body>
</html>
