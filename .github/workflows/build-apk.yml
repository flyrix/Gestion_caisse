name: Build TWA APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Restore keystore from secret
        env:
          MY_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$MY_KEYSTORE_SECRET" ]; then
            echo "❌ ERREUR CRITIQUE : Le secret KEYSTORE_BASE64 est vide sur GitHub !"
            exit 1
          fi
          echo "$MY_KEYSTORE_SECRET" | base64 --decode > release-keystore.jks
          echo "✅ Keystore restauré avec succès à la racine."

      - name: Build TWA using script
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"'"$JAVA_HOME"'","androidSdkPath":"'"$ANDROID_HOME"'"}' > ~/.bubblewrap/config.json
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

          # On rend le script exécutable et on le lance avec les variables
          chmod +x ./scripts/build_twa.sh
          
          export BUBBLEWRAP_KEYSTORE_PASSWORD="$KEYSTORE_PASSWORD"
          export BUBBLEWRAP_KEY_PASSWORD="$KEYSTORE_PASSWORD"

          ./scripts/build_twa.sh \
            "https://celadon-sprite-c23deb.netlify.app/manifest.json" \
            "com.kacou.gestioncaisse" \
            "release-keystore.jks" \
            "$KEYSTORE_PASSWORD" \
            "${KEY_ALIAS:-release}"

      - name: Find built APK
        id: find_apk
        run: |
          FINAL_APK=$(find . -name "*.apk" | grep -v "\.gradle" | head -n1)
          if [ -z "$FINAL_APK" ]; then
            echo "Erreur : Aucun APK trouvé." && exit 1
          fi
          echo "APK : $FINAL_APK"
          echo "APK_PATH=$FINAL_APK" >> $GITHUB_ENV
          echo "APK_NAME=$(basename $FINAL_APK)" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: ${{ env.APK_PATH }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Build v1.0.${{ github.run_number }}
          body: "APK automatisée — Gestion de Caisse"
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}