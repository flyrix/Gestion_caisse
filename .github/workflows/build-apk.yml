name: Build TWA APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Restore keystore from secret
        env:
          MY_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
        if: ${{ env.MY_KEYSTORE_SECRET != '' }}
        run: |
          echo "$MY_KEYSTORE_SECRET" | base64 --decode > release-keystore.jks
          echo "Keystore restauré."

      - name: Build TWA (no interactive init)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          # --- Chemins Bubblewrap ---
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"'"$JAVA_HOME"'","androidSdkPath":"'"$ANDROID_HOME"'"}' > ~/.bubblewrap/config.json

          # --- Licences Android ---
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

          # --- Variables ---
          URL_APP="https://celadon-sprite-c23deb.netlify.app"
          ID_PACKAGE="com.kacou.gestioncaisse"
          DOMAINE="celadon-sprite-c23deb.netlify.app"
          ALIAS="${KEY_ALIAS:-release}"

          # --- Nettoyage ---
          rm -rf build output android_project twa-manifest.json

          # --- Récupération des icônes depuis le manifest PWA ---
          ICON_URL=$(curl -s "$URL_APP/manifest.json" | python3 -c "
          import json,sys
          m=json.load(sys.stdin)
          icons=m.get('icons',[])
          big=[i for i in icons if '512' in i.get('sizes','')]
          print((big or icons)[0]['src'] if icons else '/icons/icon-512x512.png')
          ")
          # Rendre l'URL absolue si relative
          [[ "$ICON_URL" != http* ]] && ICON_URL="$URL_APP/$ICON_URL"
          echo "Icône détectée : $ICON_URL"

          # --- Génération directe du twa-manifest.json (bypass bubblewrap init) ---
          cat > twa-manifest.json << MANIFEST
          {
            "packageId": "$ID_PACKAGE",
            "host": "$DOMAINE",
            "name": "Gestion de Caisse",
            "launcherName": "GestionCaisse",
            "display": "standalone",
            "orientation": "default",
            "themeColor": "#FFFFFF",
            "navigationColor": "#000000",
            "navigationColorDark": "#000000",
            "navigationDividerColor": "#000000",
            "navigationDividerColorDark": "#000000",
            "backgroundColor": "#FFFFFF",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "$ICON_URL",
            "maskableIconUrl": "$ICON_URL",
            "monochromeIconUrl": "$ICON_URL",
            "appVersion": "1.0.0",
            "appVersionCode": ${{ github.run_number }},
            "signingKey": {
              "path": "release-keystore.jks",
              "alias": "$ALIAS"
            },
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "$URL_APP/",
            "minSdkVersion": 19,
            "fingerprints": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "$URL_APP/manifest.json",
            "fallbackType": "customtabs",
            "splashScreenFadeOutDuration": 300,
            "shortcutItems": [],
            "features": {},
            "alphaDependencies": { "enabled": false }
          }
          MANIFEST

          echo "=== twa-manifest.json généré ==="
          cat twa-manifest.json

          # --- Compilation ---
          if [ -f release-keystore.jks ]; then
            echo ">>> Build Release APK signée..."
            bubblewrap build \
              --keystorePath="$(pwd)/release-keystore.jks" \
              --keystorePassword="$KEYSTORE_PASSWORD" \
              --keyAlias="$ALIAS" \
              --keyPassword="$KEYSTORE_PASSWORD" \
              --yes
          else
            echo ">>> Build Debug APK..."
            bubblewrap build --debug --yes
          fi

      - name: Find built APK
        id: find_apk
        run: |
          FINAL_APK=$(find . -name "*.apk" | grep -v "\.gradle" | head -n1)
          if [ -z "$FINAL_APK" ]; then
            echo "Erreur : Aucun APK trouvé." && exit 1
          fi
          echo "APK : $FINAL_APK"
          echo "APK_PATH=$FINAL_APK" >> $GITHUB_ENV
          echo "APK_NAME=$(basename $FINAL_APK)" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: ${{ env.APK_PATH }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Build v1.0.${{ github.run_number }}
          body: "APK automatisée — Gestion de Caisse"
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}