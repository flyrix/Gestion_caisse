name: Build TWA APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Restore keystore from secret
        env:
          MY_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
        if: ${{ env.MY_KEYSTORE_SECRET != '' }}
        run: |
          echo "$MY_KEYSTORE_SECRET" | base64 --decode > release-keystore.jks
          echo "Keystore restauré."

      - name: Build TWA (no interactive init)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"'"$JAVA_HOME"'","androidSdkPath":"'"$ANDROID_HOME"'"}' > ~/.bubblewrap/config.json
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

          export URL_APP="https://celadon-sprite-c23deb.netlify.app"
          export ID_PACKAGE="com.kacou.gestioncaisse"
          export DOMAINE="celadon-sprite-c23deb.netlify.app"
          export ALIAS="${KEY_ALIAS:-release}"

          rm -rf build output android_project twa-manifest.json twa-crypto-checksums.json

          export ICON_URL=$(curl -s "$URL_APP/manifest.json" | python3 -c "
          import json,sys
          m=json.load(sys.stdin)
          icons=m.get('icons',[])
          big=[i for i in icons if '512' in i.get('sizes','')]
          print((big or icons)[0]['src'] if icons else '/icons/icon-512x512.png')
          ")
          [[ "$ICON_URL" != http* ]] && export ICON_URL="$URL_APP/$ICON_URL"
          echo "Icône : $ICON_URL"

          # Génération des fichiers de configuration sans faille d'indentation
          python3 << 'PYEOF'
          import json, os, hashlib
          
          manifest = {
              "packageId": os.environ["ID_PACKAGE"],
              "host": os.environ["DOMAINE"],
              "name": "Gestion de Caisse",
              "launcherName": "Caisse",
              "displayName": "Gestion de Caisse",
              "display": "standalone",
              "orientation": "default",
              "themeColor": "#3498db",
              "navigationColor": "#000000",
              "navigationColorDark": "#000000",
              "navigationDividerColor": "#000000",
              "navigationDividerColorDark": "#000000",
              "backgroundColor": "#ffffff",
              "enableNotifications": False,
              "startUrl": "/",
              "iconUrl": os.environ["ICON_URL"],
              "maskableIconUrl": os.environ["ICON_URL"],
              "monochromeIconUrl": os.environ["ICON_URL"],
              "appVersionName": "1.0.0",
              "appVersionCode": int(os.environ.get("RUN_NUMBER", "1")),
              "signingKey": {
                  "path": "release-keystore.jks",
                  "alias": os.environ["ALIAS"]
              },
              "additionalTrustedOrigins": [],
              "retainedBundles": [],
              "enableSiteSettingsShortcut": True,
              "isChromeOSOnly": False,
              "isMetaQuest": False,
              "fullScopeUrl": os.environ["URL_APP"] + "/",
              "minSdkVersion": 19,
              "fingerprints": [],
              "generatorApp": "bubblewrap-cli",
              "webManifestUrl": os.environ["URL_APP"] + "/manifest.json",
              "fallbackType": "customtabs",
              "splashScreenFadeOutDuration": 300,
              "shortcutItems": [],
              "features": {},
              "alphaDependencies": {"enabled": False}
          }
          
          # Écriture propre du manifeste
          with open("twa-manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          
          # Calcul MD5 et écriture du checksum pour valider l'état initial
          with open("twa-manifest.json", "rb") as f:
              md5 = hashlib.md5(f.read()).hexdigest()
          
          checksums = {"twa-manifest.json": md5}
          with open("twa-crypto-checksums.json", "w") as f:
              json.dump(checksums, f, indent=2)

          print("twa-manifest.json et twa-crypto-checksums.json générés avec succès.")
          PYEOF

          echo "=== Vérification des fichiers ==="
          cat twa-manifest.json

          # Initialisation forcée de la structure Android avec injection des entrées
          echo "Initialisation de la structure Android native..."
          printf "1.0.0\n1\ny\n" | bubblewrap update --yes || true
          # --- Compilation finale de l'APK ---
          # On injecte les variables globales de mot de passe lues par Bubblewrap
          export BUBBLEWRAP_KEYSTORE_PASSWORD="$KEYSTORE_PASSWORD"
          export BUBBLEWRAP_KEY_PASSWORD="$KEYSTORE_PASSWORD"

          if [ -f release-keystore.jks ]; then
            echo ">>> Build Release APK signée..."
            # On passe les arguments complets en ligne de commande pour couper tout prompt
            bubblewrap build \
              --keystorePath="$(pwd)/release-keystore.jks" \
              --keystorePassword="$KEYSTORE_PASSWORD" \
              --keyAlias="$ALIAS" \
              --keyPassword="$KEYSTORE_PASSWORD" \
              --skipUpdateCheck \
              --yes
          else
            echo ">>> Build Debug APK..."
            bubblewrap build --debug --skipUpdateCheck --yes
          fi

      - name: Find built APK
        id: find_apk
        run: |
          FINAL_APK=$(find . -name "*.apk" | grep -v "\.gradle" | head -n1)
          if [ -z "$FINAL_APK" ]; then
            echo "Erreur : Aucun APK trouvé." && exit 1
          fi
          echo "APK : $FINAL_APK"
          echo "APK_PATH=$FINAL_APK" >> $GITHUB_ENV
          echo "APK_NAME=$(basename $FINAL_APK)" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: ${{ env.APK_PATH }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Build v1.0.${{ github.run_number }}
          body: "APK automatisée — Gestion de Caisse"
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}