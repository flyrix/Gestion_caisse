name: Build TWA APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permet aussi de lancer le build manuellement au besoin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Java 17 Temurin : Recommandé pour éviter les crashs de Bubblewrap
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🟢 ÉTAPE CLÉ : On installe un SDK Android tout propre et complet
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Installer Bubblewrap proprement
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Rendre les scripts exécutables
        run: |
          chmod +x ./scripts/build_twa.sh
          if [ -f ./scripts/sign_apk.sh ]; then chmod +x ./scripts/sign_apk.sh; fi

      # Restauration sécurisée de ton fichier keystore binaire
      - name: Restore keystore from secret
        env:
          MY_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
        if: ${{ env.MY_KEYSTORE_SECRET != '' }}
        run: |
          echo "$MY_KEYSTORE_SECRET" | base64 --decode > release-keystore.jks
          echo "Keystore restauré avec succès."

# Initialisation et compilation forcée en mode CI non-interactif
      - name: Run Build TWA Script
        env:
          CI: true # Force de nombreux modules Node.js à couper le mode interactif
        run: |
          # 1. Configuration des chemins pour Bubblewrap
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"'"$JAVA_HOME"'","androidSdkPath":"'"$ANDROID_HOME"'"}' > ~/.bubblewrap/config.json
          
          # 2. Acceptation automatique des licences Android
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

          URL_APP="https://celadon-sprite-c23deb.netlify.app/manifest.json"
          ID_PACKAGE="com.kacou.gestioncaisse"

          # 3. SÉCURITÉ : On nettoie tout résidu pour partir sur du 100% propre
          rm -f twa-manifest.json twa-crypto-checksums.json
          rm -rf build output android_project

          # 4. INITIALISATION SANS QUESTION (On passe directement les arguments clés)
          echo "Initialisation du projet Bubblewrap..."
          bubblewrap init --manifest="$URL_APP" \
                          --packageId="$ID_PACKAGE" \
                          --appVersionName="1.0.0" \
                          --appVersionCode=1 \
                          --display=standalone \
                          --orientation=default \
                          --sc bowling \
                          --yes

          # 5. COMPILATION DE L'APK
          echo "Lancement de la compilation Gradle..."
          if [ -f release-keystore.jks ]; then
            echo "Building Release APK signée..."
            bubblewrap build --keystorePath="release-keystore.jks" --yes
          else
            echo "Building Debug APK..."
            bubblewrap build --debug --yes
          fi

      # Signature de l'APK (Validation via l'environnement pour éviter le blocage)
      - name: Sign APK (optional)
        env:
          MY_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
          MY_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PATH: release-keystore.jks
          STOREPASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYPASS: ${{ secrets.KEY_PASSWORD }}
        if: ${{ env.MY_KEYSTORE_SECRET != '' && env.MY_KEY_ALIAS != '' }}
        run: |
          set -e
          APK_PATH="$(ls build/*.apk 2>/dev/null || ls output/*.apk 2>/dev/null || true)"
          if [ -z "$APK_PATH" ]; then 
            echo "Erreur : Aucun APK généré par le build script !" && exit 1
          fi
          if [ -f ./scripts/sign_apk.sh ]; then
            ./scripts/sign_apk.sh "$APK_PATH" "$KEYSTORE_PATH" "$MY_KEY_ALIAS" "$STOREPASS" "$KEYPASS"
          else
            echo "Script de signature introuvable, utilisation de l'APK de build."
          fi

      # Identification dynamique du fichier final (signé ou non) à publier
      - name: Find built APK
        id: find_apk
        run: |
          FINAL_APK=$(ls signed-*.apk 2>/dev/null || find output build -type f -name "*.apk" | head -n1 || true)
          if [ -z "$FINAL_APK" ]; then
            echo "Erreur critique : Aucun fichier APK trouvé." && exit 1
          fi
          echo "APK Final identifié : $FINAL_APK"
          echo "APK_PATH=$FINAL_APK" >> $GITHUB_ENV
          echo "APK_NAME=$(basename "$FINAL_APK")" >> $GITHUB_ENV

      # Sauvegarde de sécurité dans les artefacts GitHub
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: ${{ env.APK_PATH }}

      # Remplacement des modules dépréciés par le standard actuel pour créer la Release
      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Build v1.0.${{ github.run_number }}
          body: "Compilation automatisée de l'APK pour l'application Gestion de Caisse."
          draft: false
          prerelease: false
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}